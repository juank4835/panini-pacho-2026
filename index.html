<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- viewport-fit=cover hace que la página se extienda DEBAJO del status bar
     y la home indicator. Combinado con apple-mobile-web-app-status-bar-style
     black-translucent, el status bar se vuelve overlay sobre el bg negro. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<!-- theme-color: color de la URL bar de Safari + del status bar en Android -->
<meta name="theme-color" content="#000000">
<!-- PWA: cuando se agrega al Home Screen, abre fullscreen sin URL bar -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<!-- black-translucent: status bar transparente sobre el bg de la página
     (que es negro). Solo aplica en modo Home Screen / PWA. -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Panini Pacho">
<!-- Iconos del home-screen / PWA usando la portada oficial del álbum -->
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png?v=1">
<link rel="apple-touch-icon-precomposed" href="icon-180.png?v=1">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=1">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=1">
<link rel="manifest" href="manifest.json?v=1">
<title>Álbum Panini · Pacho</title>
<meta name="description" content="Tracker del álbum Panini Mundial 2030 — instancia de Pacho">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100vh;
    height: 100dvh;
    background: #000000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
    color: #f0eee6;
    -webkit-tap-highlight-color: transparent;
  }
  /* Body con safe-area-inset SOLO en top y laterales — el iframe queda
     por debajo del status bar y, en landscape, esquiva el notch.
     NO ponemos padding-bottom porque la bottom nav del Apps Script ya
     tiene su propio `padding-bottom: env(safe-area-inset-bottom)` para
     respetar el área de la home indicator. Si el wrapper también lo
     pone, queda un hueco vacío negro entre la nav y el borde. */
  body {
    padding-top: env(safe-area-inset-top);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: 0;
    background: #000000;
  }
  /* Loader breve mientras carga el iframe */
  .loader {
    position: fixed;
    inset: 0;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 10;
    transition: opacity 0.3s ease;
    /* respeta safe-area en el centrado */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .loader.hide { opacity: 0; pointer-events: none; }
  .loader-title { font-size: 14px; color: #888780; }
  .loader-sub { font-size: 11px; color: #555; }
  .spinner {
    width: 36px;
    height: 36px;
    border: 2px solid rgba(239,159,39,0.15);
    border-top-color: #EF9F27;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="loader-title">Álbum Panini · Pacho</div>
  <div class="loader-sub">Cargando…</div>
</div>
<iframe
  id="app"
  src="https://script.google.com/macros/s/AKfycbxO6ce9vpKOiFwRXCw9Th_R7O1PmBAKHJtCVZGKy3_IIAvaCQ_ZQgzMBSsiasd8g18/exec"
  allow="clipboard-read; clipboard-write; web-share; camera"
  allowfullscreen
  title="Álbum Panini · Pacho"></iframe>
<script>
  // Esconde el loader cuando el iframe termina de cargar
  document.getElementById('app').addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('loader').classList.add('hide');
    }, 200);
  });
  // Failsafe: si por algún motivo el load no dispara, ocultar tras 6s
  setTimeout(() => {
    document.getElementById('loader').classList.add('hide');
  }, 6000);
</script>
</body>
</html>
