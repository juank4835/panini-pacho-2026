<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Álbum Panini Mundial 2026 · Cambios</title>
<meta name="description" content="Mi tabla de cambios del álbum Panini Mundial 2026 — lo que tengo, las repetidas y las que me faltan.">
<style>
  :root {
    --bg: #000000;
    --bg-2: #1a1a1a;
    --bg-3: #2a2a2a;
    --border: #3a3a37;
    --text: #f0eee6;
    --text-2: #b8b6ae;
    --text-3: #888780;
    --green: #00D685;
    --amber: #EF9F27;
    --amber-text: #412402;
    --danger: #E24B4A;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    font-size: 13px;
    padding-top: env(safe-area-inset-top);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  .page { max-width: 900px; margin: 0 auto; padding: 16px; }

  .hero { text-align: center; margin-bottom: 14px; }
  .hero h1 { margin: 0 0 4px; font-size: 18px; font-weight: 600; }
  .hero p { margin: 0; color: var(--text-3); font-size: 12px; }

  .stats-mini { display: flex; gap: 8px; margin-bottom: 12px; }
  .stat-pill {
    flex: 1;
    background: var(--bg-2);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .stat-pill b {
    display: block;
    font-size: 18px;
    font-family: "JetBrains Mono", Menlo, monospace;
  }
  .stat-pill small {
    color: var(--text-3);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-pill.rep b { color: var(--amber); }
  .stat-pill.falta b { color: var(--danger); }

  /* Botón copiar (estilo Cambios de la app real) */
  .btn-share-main {
    width: 100%;
    padding: 12px 16px;
    background: var(--amber);
    color: var(--amber-text);
    border: 0;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 6px;
    transition: filter 0.15s ease, background 0.2s ease, color 0.2s ease;
  }
  .btn-share-main:hover { filter: brightness(1.08); }
  .btn-share-main.copied { background: var(--green); color: #003420; }
  .share-hint {
    text-align: center;
    color: var(--text-3);
    font-size: 11px;
    margin-bottom: 14px;
    line-height: 1.4;
  }

  .legend {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  /* Legend = botones toggle. Chip neutro con un círculo de color adentro.
     Active = chip a opacidad completa con su circulito de color visible.
     Off = chip dim + círculo en gris. */
  .legend-item {
    background: var(--bg-2);
    border: 0.5px solid var(--border);
    color: var(--text-2);
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 100px;
    transition: opacity 0.2s ease, background 0.2s ease;
  }
  .legend-item:hover { background: var(--bg-3); }
  .legend-item.off { opacity: 0.4; }
  .legend-item.off .legend-cell { background: var(--bg-3); }
  .legend-cell { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .legend-cell.falta { background: var(--danger); }
  .legend-cell.rep   { background: var(--amber); }

  /* Cuando un toggle está apagado, las celdas de ese tipo se "apagan"
     (gris apagado) — siguen visibles pero pierden el color para que el ojo
     pueda enfocarse en lo que sí está activo. */
  body.hide-falta .cell.falta {
    background: var(--bg-2);
    color: var(--text-3);
    opacity: 0.45;
  }
  body.hide-rep .cell.rep {
    background: var(--bg-2);
    color: var(--text-3);
    opacity: 0.45;
  }
  body.hide-rep .cell.rep .x { display: none; }
  /* En modo Lista los toggles ocultan las filas correspondientes por completo
     (no tienen sentido "apagadas"). */
  body.hide-falta .team-card-falt { display: none; }
  body.hide-rep .team-card-rep { display: none; }

  /* === Mode switch (Lista | Mapa) === */
  .mode-switch {
    display: flex;
    background: var(--bg-2);
    border: 0.5px solid var(--border);
    border-radius: 100px;
    padding: 3px;
    margin-bottom: 12px;
    width: 100%;
  }
  .mode-switch button {
    flex: 1;
    background: transparent;
    border: 0;
    color: var(--text-3);
    font-size: 12px;
    font-weight: 500;
    padding: 8px 10px;
    border-radius: 100px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
  }
  .mode-switch button.active {
    background: var(--bg-3);
    color: var(--amber);
    font-weight: 700;
  }

  /* === Modo Lista (compacta por equipo) === */
  .team-card {
    background: var(--bg-2);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .team-card.complete { opacity: 0.55; padding: 8px 12px; }
  .team-card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .team-card-code {
    font-weight: 700;
    color: var(--text);
    font-family: "JetBrains Mono", Menlo, monospace;
    font-size: 13px;
    letter-spacing: 0.5px;
    min-width: 38px;
  }
  .team-card-progress {
    flex: 1;
    height: 5px;
    background: var(--bg-3);
    border-radius: 100px;
    overflow: hidden;
  }
  .team-card-progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: inherit;
    transition: width 0.3s ease;
  }
  .team-card-count {
    color: var(--text-3);
    font-size: 11px;
    font-family: "JetBrains Mono", Menlo, monospace;
    min-width: 42px;
    text-align: right;
  }
  .team-card-count b { color: var(--text-2); font-weight: 600; }
  .team-card-complete-mark {
    color: var(--green);
    font-weight: 700;
    font-size: 12px;
    margin-left: 4px;
  }
  .team-card-falt,
  .team-card-rep {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
    margin-left: 48px;
  }
  .team-card-falt-label,
  .team-card-rep-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
    margin-right: 4px;
  }
  .team-card-falt-label { color: var(--danger); }
  .team-card-rep-label  { color: var(--amber); }
  .id-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-family: "JetBrains Mono", Menlo, monospace;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 100px;
    font-weight: 600;
    line-height: 1.5;
  }
  .id-chip.falta {
    background: rgba(226,75,74,0.18);
    color: var(--danger);
    border: 0.5px solid rgba(226,75,74,0.4);
  }
  .id-chip.rep {
    background: rgba(239,159,39,0.18);
    color: var(--amber);
    border: 0.5px solid rgba(239,159,39,0.4);
  }
  .id-chip .x {
    font-size: 9px;
    opacity: 0.85;
    font-weight: 700;
  }
  .id-chip .x::before { content: '×'; }
  .group-banner {
    color: var(--text-3);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin: 14px 0 6px;
    padding: 0 4px;
  }

  /* Tabla checklist */
  .table-grid {
    display: grid;
    grid-template-columns: 70px repeat(20, 1fr);
    gap: 2px;
    margin-bottom: 12px;
    font-size: 10px;
    font-family: "JetBrains Mono", Menlo, monospace;
  }
  .col-header {
    text-align: center;
    color: var(--text-3);
    padding: 6px 0;
    font-weight: 700;
    font-size: 9px;
  }
  .group-row {
    grid-column: 1 / -1;
    background: var(--bg-2);
    color: var(--amber);
    padding: 6px 10px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
    border-radius: 6px;
  }
  .team-name {
    padding: 6px 8px;
    background: var(--bg-2);
    border-radius: 4px;
    color: var(--text-2);
    font-weight: 600;
    display: flex;
    align-items: center;
    font-size: 11px;
  }
  .cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 9px;
    border-radius: 50%;
    position: relative;
  }
  .cell.tengo { background: var(--bg-2); color: var(--text-3); opacity: 0.45; }
  .cell.falta { background: var(--danger); color: #fff; }
  .cell.rep {
    background: var(--amber);
    color: #fff;
    /* Apilamos verticalmente el número arriba y el contador "×N" abajo,
       ambos centrados dentro del círculo. */
    flex-direction: column;
    line-height: 1;
    gap: 1px;
  }
  .cell.rep .x {
    font-size: 6px;
    font-weight: 700;
    line-height: 1;
    color: #fff;
    opacity: 0.85;
  }
  .cell.rep .x::before { content: '×'; opacity: 0.7; }

  /* Loading & error */
  .loading, .errstate {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-3);
  }
  .errstate { color: var(--danger); }
  .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 2px solid rgba(239,159,39,0.2);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .refresh {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    color: var(--text-2);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    margin-top: 12px;
  }
  .refresh:hover { background: var(--bg-2); color: var(--text); }

  footer {
    color: var(--text-3);
    font-size: 11px;
    margin-top: 24px;
    padding-top: 18px;
    border-top: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
  }
  footer a { color: var(--amber); text-decoration: none; }
  /* Avatar circular de los doggos espaciales — tap abre modal full-screen */
  .doggos-mini {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 88px; height: 88px;
    padding: 0;
    border-radius: 50%;
    border: 0.5px solid var(--border);
    background: var(--bg-2);
    cursor: pointer;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .doggos-mini img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .doggos-mini:hover {
    transform: scale(1.05);
    border-color: var(--amber);
    box-shadow: 0 0 0 0.5px var(--amber), 0 0 12px rgba(239,159,39,0.45);
  }
  .doggos-mini:active { transform: scale(0.96); }
  .doggos-modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 3000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .doggos-modal-backdrop.open { display: flex; animation: doggosFadeIn 0.18s ease-out; }
  @keyframes doggosFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .doggos-modal-img {
    max-width: 90vw;
    max-height: 80vh;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(247,147,26,0.4), 0 0 0 0.5px rgba(239,159,39,0.6);
    animation: doggosScaleIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes doggosScaleIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .doggos-modal-cap {
    position: absolute;
    bottom: 32px;
    left: 0; right: 0;
    text-align: center;
    color: var(--amber);
    font-size: 12px;
    font-family: "JetBrains Mono", Menlo, monospace;
    letter-spacing: 0.5px;
    text-shadow: 0 0 6px rgba(239,159,39,0.5);
  }
</style>
</head>
<body>
<div class="page">

  <div class="hero">
    <h1>📒 Álbum Panini Mundial 2026 · Cambios</h1>
    <p id="subtitle">Cargando…</p>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>Cargando estado del álbum…</div>
    </div>
  </div>

  <footer>
    <button type="button" id="doggos-mini-btn" class="doggos-mini" aria-label="Ver perros espaciales">
      <img src="https://juank4835.github.io/panini-pacho-2026/doggos.jpg" alt="">
    </button>
    <div>
      Hecho por Juan Camilo<br>
      <span style="opacity:0.75;">Vista pública · Solo lectura · Datos en vivo</span><br>
      <a href="../">Tracker (privado)</a> · <a href="../arquitectura/">arquitectura</a>
    </div>
  </footer>
</div>

<div class="doggos-modal-backdrop" id="doggos-modal-backdrop">
  <img src="https://juank4835.github.io/panini-pacho-2026/doggos.jpg" alt="" class="doggos-modal-img">
  <div class="doggos-modal-cap">Stack sats · Paste cromos</div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxO6ce9vpKOiFwRXCw9Th_R7O1PmBAKHJtCVZGKy3_IIAvaCQ_ZQgzMBSsiasd8g18/exec';
  const SHARE_URL = 'https://juank4835.github.io/panini-pacho-2026/cambios/';

  // Modo de visualización del listado del álbum. 'lista' (default) = tarjetas
  // compactas por equipo solo con lo accionable (faltantes + repetidas);
  // 'mapa' = grid completa de 20 columnas (vista original).
  let currentMode = 'lista';

  // === Catálogo ===
  const introStickers = [
    { id: '00', displayNum: '00' },
    { id: 'FWC1', displayNum: 'FWC1' }, { id: 'FWC2', displayNum: 'FWC2' },
    { id: 'FWC3', displayNum: 'FWC3' }, { id: 'FWC4', displayNum: 'FWC4' },
    { id: 'FWC5', displayNum: 'FWC5' }, { id: 'FWC6', displayNum: 'FWC6' },
    { id: 'FWC7', displayNum: 'FWC7' }, { id: 'FWC8', displayNum: 'FWC8' }
  ];
  const historyStickers = [
    { id: 'FWC9', displayNum: 'FWC9' }, { id: 'FWC10', displayNum: 'FWC10' },
    { id: 'FWC11', displayNum: 'FWC11' }, { id: 'FWC12', displayNum: 'FWC12' },
    { id: 'FWC13', displayNum: 'FWC13' }, { id: 'FWC14', displayNum: 'FWC14' },
    { id: 'FWC15', displayNum: 'FWC15' }, { id: 'FWC16', displayNum: 'FWC16' },
    { id: 'FWC17', displayNum: 'FWC17' }, { id: 'FWC18', displayNum: 'FWC18' },
    { id: 'FWC19', displayNum: 'FWC19' }
  ];
  const equiposDefault = [
    { code:'MEX', name:'México', grupo:'A' }, { code:'RSA', name:'Sudáfrica', grupo:'A' },
    { code:'KOR', name:'Corea del Sur', grupo:'A' }, { code:'CZE', name:'Rep. Checa', grupo:'A' },
    { code:'CAN', name:'Canadá', grupo:'B' }, { code:'BIH', name:'Bosnia y Herz.', grupo:'B' },
    { code:'QAT', name:'Catar', grupo:'B' }, { code:'SUI', name:'Suiza', grupo:'B' },
    { code:'BRA', name:'Brasil', grupo:'C' }, { code:'MAR', name:'Marruecos', grupo:'C' },
    { code:'HAI', name:'Haití', grupo:'C' }, { code:'SCO', name:'Escocia', grupo:'C' },
    { code:'USA', name:'Estados Unidos', grupo:'D' }, { code:'PAR', name:'Paraguay', grupo:'D' },
    { code:'AUS', name:'Australia', grupo:'D' }, { code:'TUR', name:'Turquía', grupo:'D' },
    { code:'GER', name:'Alemania', grupo:'E' }, { code:'CUW', name:'Curazao', grupo:'E' },
    { code:'CIV', name:'Costa de Marfil', grupo:'E' }, { code:'ECU', name:'Ecuador', grupo:'E' },
    { code:'NED', name:'Países Bajos', grupo:'F' }, { code:'JPN', name:'Japón', grupo:'F' },
    { code:'SWE', name:'Suecia', grupo:'F' }, { code:'TUN', name:'Túnez', grupo:'F' },
    { code:'BEL', name:'Bélgica', grupo:'G' }, { code:'EGY', name:'Egipto', grupo:'G' },
    { code:'IRN', name:'Irán', grupo:'G' }, { code:'NZL', name:'Nueva Zelanda', grupo:'G' },
    { code:'ESP', name:'España', grupo:'H' }, { code:'CPV', name:'Cabo Verde', grupo:'H' },
    { code:'KSA', name:'Arabia Saudita', grupo:'H' }, { code:'URU', name:'Uruguay', grupo:'H' },
    { code:'FRA', name:'Francia', grupo:'I' }, { code:'SEN', name:'Senegal', grupo:'I' },
    { code:'IRQ', name:'Iraq', grupo:'I' }, { code:'NOR', name:'Noruega', grupo:'I' },
    { code:'ARG', name:'Argentina', grupo:'J' }, { code:'ALG', name:'Argelia', grupo:'J' },
    { code:'AUT', name:'Austria', grupo:'J' }, { code:'JOR', name:'Jordania', grupo:'J' },
    { code:'POR', name:'Portugal', grupo:'K' }, { code:'COD', name:'RD Congo', grupo:'K' },
    { code:'UZB', name:'Uzbekistán', grupo:'K' }, { code:'COL', name:'Colombia', grupo:'K' },
    { code:'ENG', name:'Inglaterra', grupo:'L' }, { code:'CRO', name:'Croacia', grupo:'L' },
    { code:'GHA', name:'Ghana', grupo:'L' }, { code:'PAN', name:'Panamá', grupo:'L' }
  ];

  // === Fetch via JSONP ===
  function loadData() {
    return new Promise((resolve, reject) => {
      const cbName = 'paniniCb_' + Date.now();
      let timeout;
      window[cbName] = (data) => {
        clearTimeout(timeout);
        delete window[cbName];
        resolve(data);
      };
      const script = document.createElement('script');
      script.src = APPS_SCRIPT_URL + '?action=publica&callback=' + cbName + '&_=' + Date.now();
      script.onerror = () => {
        clearTimeout(timeout);
        delete window[cbName];
        reject(new Error('No se pudo conectar al backend'));
      };
      document.body.appendChild(script);
      timeout = setTimeout(() => {
        delete window[cbName];
        reject(new Error('Timeout (15s) al conectar'));
      }, 15000);
    });
  }

  function statusOf(state, id) {
    const s = state[id];
    if (!s) return { st: 'falta', copies: 0 };
    const p = parseInt(s.p, 10) || 0;
    const su = parseInt(s.s, 10) || 0;
    const total = p + su;
    if (total === 0) return { st: 'falta', copies: 0 };
    if (total >= 2) return { st: 'rep', copies: total };
    return { st: 'tengo', copies: 1 };
  }

  function render(state, equipos) {
    // Stats globales
    const allItems = [];
    introStickers.forEach(s => allItems.push(s));
    equipos.forEach(eq => {
      for (let i = 1; i <= 20; i++) allItems.push({ id: eq.code + '-' + i, displayNum: String(i) });
    });
    historyStickers.forEach(s => allItems.push(s));

    let nTengo = 0, nRep = 0, nFalta = 0, nRepExtras = 0;
    allItems.forEach(it => {
      const r = statusOf(state, it.id);
      if (r.st === 'falta') nFalta++;
      else {
        nTengo++;
        if (r.st === 'rep') {
          nRep++;
          nRepExtras += (r.copies - 1); // copias extra (no incluye la 1ª que va al álbum)
        }
      }
    });
    const total = allItems.length;
    const pct = total > 0 ? (nTengo / total * 100) : 0;

    // Construir HTML — muestro TOTAL DE COPIAS EXTRAS (mismo criterio que el
    // home del tracker, así los números coinciden entre las dos vistas).
    let html = '<div class="stats-mini">' +
      '<div class="stat-pill rep"><b>' + nRepExtras + '</b><small>Repetidas</small></div>' +
      '<div class="stat-pill falta"><b>' + nFalta + '</b><small>Me faltan</small></div>' +
    '</div>';

    html += '<button class="btn-share-main" id="btn-share">📋 Copiar faltantes + repetidas</button>' +
      '<button class="refresh" id="btn-refresh">🔄 Actualizar datos</button>' +
      '<div class="share-hint">El mensaje queda listo para pegar en WhatsApp / Telegram. Tocá Actualizar para traer los últimos datos del álbum.</div>';

    // Mode switch: Lista (default, compacta) | Mapa (grid completa).
    html += '<div class="mode-switch">' +
      '<button type="button" data-mode="lista" class="' + (currentMode === 'lista' ? 'active' : '') + '">📋 Lista</button>' +
      '<button type="button" data-mode="mapa" class="' + (currentMode === 'mapa' ? 'active' : '') + '">🗺 Mapa</button>' +
    '</div>';

    html += '<div class="legend">' +
      '<button class="legend-item" data-toggle="falta"><span class="legend-cell falta"></span> Me falta</button>' +
      '<button class="legend-item" data-toggle="rep"><span class="legend-cell rep"></span> Tengo repetida (×N copias)</button>' +
    '</div>';

    // Body por modo
    if (currentMode === 'lista') {
      html += renderListaBody(state, equipos);
    } else {
      html += renderMapaBody(state, equipos);
    }

    document.getElementById('content').innerHTML = html;
    document.getElementById('subtitle').textContent =
      pct.toFixed(1) + '% completo · ' + nTengo + ' / ' + total + ' · actualizado ' + new Date().toLocaleTimeString();

    // Bind del botón compartir
    document.getElementById('btn-share').onclick = (e) => {
      copyToClipboard(buildShareMessage(state, equipos), e.currentTarget);
    };
    document.getElementById('btn-refresh').onclick = () => init();

    // Mode switch handler — re-renderiza con el nuevo modo. Mantiene los
    // toggles de hide-falta/hide-rep al cambiar de modo (siguen ocultando).
    document.querySelectorAll('.mode-switch button[data-mode]').forEach(btn => {
      btn.onclick = () => {
        const next = btn.dataset.mode;
        if (next === currentMode) return;
        currentMode = next;
        render(state, equipos);
      };
    });

    // Toggles del legend (Me falta / Tengo repetida): en modo Mapa apagan
    // el color de las celdas; en modo Lista ocultan las filas correspondientes.
    document.querySelectorAll('.legend-item[data-toggle]').forEach(btn => {
      // Restaurar estado visual del toggle si ya estaba apagado antes del re-render.
      const what = btn.dataset.toggle;
      if (document.body.classList.contains('hide-' + what)) btn.classList.add('off');
      btn.onclick = () => {
        const w = btn.dataset.toggle; // 'falta' | 'rep'
        btn.classList.toggle('off');
        document.body.classList.toggle('hide-' + w);
      };
    });
  }

  // === Modo Lista: tarjetas compactas por equipo ===
  // Cada equipo muestra su progreso (N/20 pegadas) + lista de faltantes y
  // repetidas. Equipos completos colapsan a una row con check verde.
  // Si un equipo no tiene ni faltantes ni repetidas que mostrar (porque están
  // ocultados por toggle, o porque está completo), se reduce a la row de
  // progreso.
  function renderListaBody(state, equipos) {
    let html = '';

    // Helper para una tarjeta de equipo (o intro/history)
    function teamCard(code, items, totalLaminas) {
      let pegadas = 0;
      const faltas = [];
      const repetidas = [];
      items.forEach(it => {
        const r = statusOf(state, it.id);
        if (r.st === 'falta') {
          faltas.push(it.displayNum);
        } else if (r.st === 'rep') {
          repetidas.push({ num: it.displayNum, extras: r.copies - 1 });
          pegadas++; // tener repetidas implica tenerla pegada (al menos 1)
        } else {
          pegadas++; // 'tengo' = pegada simple
        }
      });
      const total = totalLaminas;
      const pct = total > 0 ? (pegadas / total * 100) : 0;
      const isComplete = (faltas.length === 0 && repetidas.length === 0);
      let card = '<div class="team-card' + (isComplete ? ' complete' : '') + '">';
      card += '<div class="team-card-head">' +
        '<span class="team-card-code">' + code + '</span>' +
        '<span class="team-card-progress"><span class="team-card-progress-fill" style="width:' + pct.toFixed(1) + '%"></span></span>' +
        '<span class="team-card-count"><b>' + pegadas + '</b>/' + total + (isComplete ? '<span class="team-card-complete-mark">✓</span>' : '') + '</span>' +
      '</div>';
      if (faltas.length) {
        card += '<div class="team-card-falt">' +
          '<span class="team-card-falt-label">↑ Faltan ' + faltas.length + '</span>' +
          faltas.map(n => '<span class="id-chip falta">' + n + '</span>').join('') +
        '</div>';
      }
      if (repetidas.length) {
        card += '<div class="team-card-rep">' +
          '<span class="team-card-rep-label">↓ Rep ' + repetidas.length + '</span>' +
          repetidas.map(r => {
            const xPart = r.extras > 1 ? '<span class="x">' + r.extras + '</span>' : '';
            return '<span class="id-chip rep">' + r.num + xPart + '</span>';
          }).join('') +
        '</div>';
      }
      card += '</div>';
      return card;
    }

    // Intro
    html += '<div class="group-banner">Intro · Logos y emblemas</div>';
    html += teamCard('INTRO', introStickers, introStickers.length);

    // Equipos por grupo
    const grupos = ['A','B','C','D','E','F','G','H','I','J','K','L'];
    grupos.forEach(grupo => {
      const teamsInGrupo = equipos.filter(eq => eq.grupo === grupo);
      if (!teamsInGrupo.length) return;
      html += '<div class="group-banner">Grupo ' + grupo + '</div>';
      teamsInGrupo.forEach(eq => {
        const items = [];
        for (let i = 1; i <= 20; i++) items.push({ id: eq.code + '-' + i, displayNum: String(i) });
        html += teamCard(eq.code, items, 20);
      });
    });

    // History
    html += '<div class="group-banner">History · Mundiales pasados</div>';
    html += teamCard('HIST', historyStickers, historyStickers.length);

    return html;
  }

  // === Modo Mapa: grid completa de 20 columnas (la vista original) ===
  function renderMapaBody(state, equipos) {
    let html = '<div class="table-grid">';
    html += '<div></div>';
    for (let i = 1; i <= 20; i++) html += '<div class="col-header">' + i + '</div>';

    function teamRow(code, items) {
      let row = '<div class="team-name">' + code + '</div>';
      items.forEach(it => {
        const r = statusOf(state, it.id);
        if (r.st === 'rep') {
          const xN = r.copies - 1;
          row += '<div class="cell rep">' + it.displayNum + '<span class="x">' + xN + '</span></div>';
        } else if (r.st === 'falta') {
          row += '<div class="cell falta">' + it.displayNum + '</div>';
        } else {
          row += '<div class="cell tengo">' + it.displayNum + '</div>';
        }
      });
      return row;
    }

    html += '<div class="group-row">Intro</div>';
    let introHtml = '<div class="team-name">INTRO</div>';
    introStickers.forEach(s => {
      const r = statusOf(state, s.id);
      if (r.st === 'rep') {
        const xN = r.copies - 1;
        introHtml += '<div class="cell rep" style="font-size:7px;">' + s.displayNum + '<span class="x">' + xN + '</span></div>';
      } else if (r.st === 'falta') {
        introHtml += '<div class="cell falta" style="font-size:7px;">' + s.displayNum + '</div>';
      } else {
        introHtml += '<div class="cell tengo" style="font-size:7px;">' + s.displayNum + '</div>';
      }
    });
    for (let i = introStickers.length; i < 20; i++) introHtml += '<div></div>';
    html += introHtml;

    const grupos = ['A','B','C','D','E','F','G','H','I','J','K','L'];
    grupos.forEach(grupo => {
      const teamsInGrupo = equipos.filter(eq => eq.grupo === grupo);
      if (!teamsInGrupo.length) return;
      html += '<div class="group-row">Grupo ' + grupo + '</div>';
      teamsInGrupo.forEach(eq => {
        const items = [];
        for (let i = 1; i <= 20; i++) items.push({ id: eq.code + '-' + i, displayNum: String(i) });
        html += teamRow(eq.code, items);
      });
    });

    html += '<div class="group-row">History</div>';
    let histHtml = '<div class="team-name">HIST</div>';
    historyStickers.forEach(s => {
      const r = statusOf(state, s.id);
      if (r.st === 'rep') {
        const xN = r.copies - 1;
        histHtml += '<div class="cell rep" style="font-size:7px;">' + s.displayNum + '<span class="x">' + xN + '</span></div>';
      } else if (r.st === 'falta') {
        histHtml += '<div class="cell falta" style="font-size:7px;">' + s.displayNum + '</div>';
      } else {
        histHtml += '<div class="cell tengo" style="font-size:7px;">' + s.displayNum + '</div>';
      }
    });
    for (let i = historyStickers.length; i < 20; i++) histHtml += '<div></div>';
    html += histHtml;

    html += '</div>';
    return html;
  }

  // === Mensaje de compartir (mismo formato que la app real) ===
  function buildShareMessage(state, equipos) {
    let totalFalt = 0, totalRep = 0;
    const fIntro = [], rIntro = [];
    const fHist = [], rHist = [];
    const eqMap = {};

    introStickers.forEach(s => {
      const r = statusOf(state, s.id);
      if (r.st === 'falta') { fIntro.push(s.displayNum); totalFalt++; }
      else if (r.st === 'rep') {
        const extras = r.copies - 1;
        for (let i = 0; i < extras; i++) rIntro.push(s.displayNum);
        totalRep += extras;
      }
    });
    historyStickers.forEach(s => {
      const r = statusOf(state, s.id);
      if (r.st === 'falta') { fHist.push(s.displayNum); totalFalt++; }
      else if (r.st === 'rep') {
        const extras = r.copies - 1;
        for (let i = 0; i < extras; i++) rHist.push(s.displayNum);
        totalRep += extras;
      }
    });
    equipos.forEach(eq => {
      eqMap[eq.code] = { faltan: [], rep: [] };
      for (let i = 1; i <= 20; i++) {
        const r = statusOf(state, eq.code + '-' + i);
        if (r.st === 'falta') { eqMap[eq.code].faltan.push(String(i)); totalFalt++; }
        else if (r.st === 'rep') {
          const extras = r.copies - 1;
          for (let j = 0; j < extras; j++) eqMap[eq.code].rep.push(String(i));
          totalRep += extras;
        }
      }
    });

    const lines = ['🎴 Álbum Panini Mundial 2026', ''];
    if (totalFalt > 0) {
      lines.push('📋 ME FALTAN (' + totalFalt + '):');
      if (fIntro.length) lines.push('Intro: ' + fIntro.join(', '));
      equipos.forEach(eq => {
        const e = eqMap[eq.code];
        if (e && e.faltan.length) lines.push(eq.code + ': ' + e.faltan.join(', '));
      });
      if (fHist.length) lines.push('History: ' + fHist.join(', '));
      lines.push('');
    }
    if (totalRep > 0) {
      lines.push('🔄 TENGO PARA CAMBIAR (' + totalRep + '):');
      if (rIntro.length) lines.push('Intro: ' + rIntro.join(', '));
      equipos.forEach(eq => {
        const e = eqMap[eq.code];
        if (e && e.rep.length) lines.push(eq.code + ': ' + e.rep.join(', '));
      });
      if (rHist.length) lines.push('History: ' + rHist.join(', '));
      lines.push('');
    }
    if (totalFalt === 0 && totalRep === 0) lines.push('🎉 ¡Álbum completo!');
    else lines.push('🤝 ¿Hacemos cambio?');
    lines.push('');
    lines.push('📲 ' + SHARE_URL);
    return lines.join('\n');
  }

  function copyToClipboard(text, btn) {
    const orig = btn.textContent;
    const done = () => {
      btn.textContent = '✓ Copiado';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(fallback);
    } else { fallback(); }
    function fallback() {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch(e) {}
      document.body.removeChild(ta);
      done();
    }
  }

  async function init() {
    document.getElementById('content').innerHTML =
      '<div class="loading"><div class="spinner"></div><div>Cargando estado…</div></div>';
    try {
      const data = await loadData();
      if (!data || !data.ok) throw new Error('Respuesta inválida');
      let equipos = equiposDefault;
      if (data.orden && Array.isArray(data.orden) && data.orden.length === 48) equipos = data.orden;
      render(data.state || {}, equipos);
    } catch (e) {
      document.getElementById('content').innerHTML =
        '<div class="errstate">⚠ ' + (e.message || 'Error al cargar') +
        '<br><br><button class="refresh" onclick="init()">Reintentar</button></div>';
    }
  }
  init();

  // Tap en el avatar del footer abre el modal con la foto a tamaño full;
  // tap en el backdrop cierra. Idéntico al del tracker privado.
  (function bindDoggosModal() {
    const btn = document.getElementById('doggos-mini-btn');
    const modal = document.getElementById('doggos-modal-backdrop');
    if (!btn || !modal) return;
    btn.onclick = (e) => { e.stopPropagation(); modal.classList.add('open'); };
    modal.onclick = () => { modal.classList.remove('open'); };
  })();
</script>
